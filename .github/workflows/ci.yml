name: repository-checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lightweight-verification:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.8"
          enable-cache: true
          cache-dependency-glob: hub/uv.lock

      - name: Install locked lightweight dependencies
        run: uv sync --project hub --extra test --locked

      - name: Verify repository and run tests
        run: bash hub/scripts/verify_repository.sh --tests --python hub/.venv/bin/python
